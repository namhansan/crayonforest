backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "content"
    label: "홈페이지 콘텐츠"
    files:
      - file: "content/settings.json"
        label: "연락처 · 위치 정보"
        name: "settings"
        fields:
          - { label: "전화번호", name: "phone", widget: "string" }
          - { label: "주소", name: "address", widget: "string" }
          - { label: "카카오톡 채널 링크", name: "kakao", widget: "string", required: false }
          - { label: "인스타그램(크레용숲) 링크", name: "instagram1", widget: "string", required: false }
          - { label: "인스타그램(어린이색채학교) 링크", name: "instagram2", widget: "string", required: false }
          - { label: "블로그 링크", name: "blog", widget: "string", required: false }

      - file: "content/popup.json"
        label: "팝업 공지"
        name: "popup"
        fields:
          - { label: "팝업 사용 여부 (끄면 안 뜸)", name: "enabled", widget: "boolean", default: true }
          - { label: "포스터 이미지 (선택)", name: "image", widget: "image", required: false }
          - { label: "포스터 이미지2 - 자세히보기용 (선택)", name: "image2", widget: "image", required: false }
          - { label: "상단 배너 문구", name: "banner_text", widget: "string" }
          - { label: "제목", name: "title", widget: "string" }
          - { label: "본문", name: "body", widget: "text" }

      - file: "content/banners.json"
        label: "메인 배너 문구"
        name: "banners"
        fields:
          - label: "배너 목록 (좌측부터 순서대로 노출)"
            name: "slides"
            widget: "list"
            fields:
              - { label: "태그 (예: Child Art)", name: "tag", widget: "string" }
              - { label: "제목 문구", name: "title", widget: "string" }

      - file: "content/events.json"
        label: "SCHEDULE · 특강/일정"
        name: "events"
        fields:
          - label: "일정 목록"
            name: "items"
            widget: "list"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "날짜", name: "date", widget: "date", format: "YYYY-MM-DD" }
              - { label: "설명", name: "desc", widget: "text" }

      - file: "content/intensive.json"
        label: "SCHEDULE · 방학특강 시간표"
        name: "intensive"
        fields:
          - { label: "표 사용 여부 (끄면 시간표 페이지에서 안 보임)", name: "enabled", widget: "boolean", default: true }
          - { label: "제목", name: "title", widget: "string", default: "여름 방학특강 시간표" }
          - { label: "기간 표시 문구 (예: 7.27 월 ~ 8.1 토)", name: "date_range", widget: "string" }
          - label: "요일/날짜 (왼쪽부터 순서대로, 보통 6칸: 월~토)"
            name: "columns"
            widget: "list"
            fields:
              - { label: "표시할 요일·날짜", name: "day_label", widget: "string" }
          - label: "시간대별 줄"
            name: "rows"
            widget: "list"
            fields:
              - { label: "시간 (예: 오전 11:00~12:30)", name: "time_label", widget: "string" }
              - label: "각 요일 칸 (columns와 같은 순서·개수로 입력)"
                name: "cells"
                widget: "list"
                fields:
                  - { label: "말머리 태그 (예: *방학특강*, 없으면 비워두기)", name: "tag", widget: "string", required: false }
                  - { label: "프로그램/반 이름 (없으면 비워두기)", name: "program", widget: "string", required: false }
                  - { label: "상태", name: "status", widget: "select", options: ["없음","자리있음","마감"], default: "없음" }
                  - { label: "상태 문구 (예: 2명 자리 / 마감)", name: "status_label", widget: "string", required: false }
          - { label: "하단 안내 문구", name: "note", widget: "text", required: false }

      - file: "content/gallery.json"
        label: "프로그램별 활동사진"
        name: "gallery"
        fields:
          - label: "CHILD ART 사진"
            name: "child"
            widget: "list"
            required: false
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "설명", name: "caption", widget: "string", required: false }
          - label: "YOUTH ART 사진"
            name: "youth"
            widget: "list"
            required: false
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "설명", name: "caption", widget: "string", required: false }
          - label: "ADULT ART 사진"
            name: "adult"
            widget: "list"
            required: false
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "설명", name: "caption", widget: "string", required: false }
          - label: "FOR MOM 사진"
            name: "mom"
            widget: "list"
            required: false
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "설명", name: "caption", widget: "string", required: false }
