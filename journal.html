<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성장카르테 | 크레용숲</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500;1,600&family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FBF6EE; --ivory-deep:#F3EBDC; --forest:#2C4A3B; --clay:#BE6A42;
    --gold:#D3A24C; --berry:#8B4B5C; --sage:#93AC8C; --ink:#2A2622; --paper:#FFFFFF; --line:#E4DBC9;
    --radius-lg:32px; --radius-md:20px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Noto Sans KR',sans-serif; background:var(--ivory); color:var(--ink); line-height:1.7;}
  .logotype{font-family:'Playfair Display',serif; font-style:italic; font-weight:500;}
  a{color:inherit; text-decoration:none;}
  .eyebrow{font-size:12px; letter-spacing:.16em; text-transform:uppercase; font-weight:600; color:var(--clay);}
  .wrap{max-width:820px; margin:0 auto; padding:0 24px;}
  header{padding:18px 0; border-bottom:1px solid var(--line);}
  .header-inner{max-width:820px; margin:0 auto; padding:0 24px; display:flex; justify-content:space-between; align-items:center;}
  .brand{font-size:19px; color:var(--forest);}
  .cta-btn{background:var(--clay); color:#fff; padding:9px 16px; border-radius:999px; font-size:13px; font-weight:600; border:none; cursor:pointer;}

  .hero{padding:50px 0 20px; text-align:center;}
  .hero h1{font-family:'Noto Serif KR',serif; font-size:clamp(22px,3vw,28px); color:var(--forest); margin-top:10px;}
  .hero p{color:#6b6459; font-size:14px; margin-top:10px;}

  /* ---------- 로그인 ---------- */
  .login-card{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-md);
    max-width:400px; margin:30px auto; padding:34px;
  }
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--forest); margin-bottom:6px;}
  .field input{width:100%; border:1.5px solid var(--line); border-radius:10px; padding:12px 14px; font-size:14px; background:var(--ivory);}
  .login-btn{width:100%; background:var(--forest); color:#fff; padding:13px; border-radius:12px; font-size:14.5px; font-weight:700; border:none; cursor:pointer;}
  .login-err{color:#c0554f; font-size:13px; margin-top:10px; text-align:center; min-height:18px;}
  .privacy-note{font-size:12px; color:#9a9285; text-align:center; margin-top:14px; line-height:1.6;}

  /* ---------- 카르테 표지 ---------- */
  #journalView{display:none;}
  .carte-cover{
    background: radial-gradient(circle at 30% 20%, #F3E3D3 0%, var(--ivory) 60%);
    border-radius:var(--radius-lg); padding:60px 40px; text-align:center; margin-bottom:34px;
    border:1px solid var(--line);
  }
  .carte-cover .brand-mark{font-family:'Playfair Display',serif; font-style:italic; color:var(--clay); font-size:18px;}
  .carte-cover h2{font-family:'Noto Serif KR',serif; font-size:clamp(26px,4vw,36px); color:var(--forest); margin:14px 0 6px;}
  .carte-cover .sub{font-size:13.5px; color:#8a8378; margin-bottom:26px;}
  .cover-photo-ring{
    width:150px; height:150px; border-radius:50%; margin:0 auto 22px; overflow:hidden;
    border:6px solid var(--paper); box-shadow:0 14px 30px -14px rgba(44,74,59,.4); background:var(--ivory-deep);
  }
  .cover-photo-ring img{width:100%; height:100%; object-fit:cover;}
  .carte-cover .child-name{font-family:'Noto Serif KR',serif; font-size:22px; color:var(--forest); margin-bottom:6px;}
  .carte-cover .term{font-size:13.5px; color:var(--clay); font-weight:600;}
  .stat-row{display:flex; justify-content:center; gap:26px; margin-top:26px; flex-wrap:wrap;}
  .stat-row div{font-size:12px; color:#8a8378;}
  .stat-row b{display:block; font-family:'Noto Serif KR',serif; font-size:20px; color:var(--forest);}
  .print-btn{
    display:inline-flex; align-items:center; gap:6px; background:var(--paper); border:1.5px solid var(--forest);
    color:var(--forest); padding:9px 18px; border-radius:999px; font-size:13px; font-weight:600; margin-top:26px;
  }
  .logout-link{display:block; text-align:center; font-size:12.5px; color:#8a8378; text-decoration:underline; margin-top:8px;}

  /* ---------- 월별 카드 (원본 PPTX 레이아웃 참고) ---------- */
  .month-card{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-lg);
    padding:36px; margin-bottom:26px; position:relative; overflow:hidden;
  }
  .month-num{
    font-family:'Noto Serif KR',serif; font-size:56px; font-weight:700; color:var(--ivory-deep);
    position:absolute; top:14px; right:28px; line-height:1; -webkit-text-stroke:1px var(--line);
  }
  .month-title-row{margin-bottom:20px;}
  .month-badge{display:inline-block; background:var(--forest); color:#fff; font-size:12px; font-weight:700; padding:4px 14px; border-radius:8px;}
  .artwork-title{font-family:'Noto Serif KR',serif; font-size:17px; color:var(--forest); margin-top:10px;}

  .carte-grid{display:grid; grid-template-columns:1.2fr 1fr; gap:26px;}
  @media(max-width:640px){ .carte-grid{grid-template-columns:1fr;} }
  .photo-main{width:100%; aspect-ratio:4/3; border-radius:18px; object-fit:cover; background:var(--ivory-deep);}
  .observation{
    background:var(--ivory-deep); border-radius:14px; padding:16px 18px; margin-top:14px; font-size:13.5px;
    color:#4b463f; line-height:1.8; white-space:pre-line;
  }
  .observation-label{font-size:11.5px; font-weight:700; color:var(--clay); margin-bottom:6px; display:block;}
  .observation::before{content:"“ "; color:var(--clay);}

  .photo-sub{width:100%; aspect-ratio:4/3; border-radius:18px; object-fit:cover; background:var(--ivory-deep); margin-bottom:16px;}
  .info-block{margin-bottom:14px;}
  .info-label{font-size:11.5px; font-weight:700; color:var(--clay); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; display:block;}
  .color-row{display:flex; align-items:center; gap:10px;}
  .swatch{width:26px; height:26px; border-radius:50%; border:1px solid var(--line); flex-shrink:0;}
  .color-row span{font-family:'Noto Serif KR',serif; font-size:16px; color:var(--forest);}
  .material-pills{display:flex; flex-wrap:wrap; gap:6px;}
  .pill{background:var(--paper); border:1px solid var(--line); font-size:12px; color:var(--forest); padding:5px 12px; border-radius:999px;}

  .empty-state{text-align:center; padding:50px 0; color:#8a8378; font-size:14px;}
  footer{text-align:center; padding:40px 0; font-size:12.5px; color:#8a8378;}

  /* ---------- 종합 요약 (색채 차트 + 원장님 해석) ---------- */
  .summary-section{margin-top:30px;}
  .sec-label{display:flex; align-items:center; gap:8px; margin-bottom:16px;}
  .sec-label h3{font-family:'Noto Serif KR',serif; font-size:17px; color:var(--forest);}
  .sec-label .tag{font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px;}
  .tag-auto{background:#E4F0E0; color:#5C7A56;}
  .tag-manual{background:#F3E3E8; color:var(--berry);}

  .timeline-card, .freq-card, .wheel-card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-md); padding:28px 26px; margin-bottom:16px;}
  .wheel-card{text-align:center;}
  .wheel-card svg{max-width:280px; margin:0 auto;}
  .wheel-caption{font-size:12px; color:#9a9285; margin-top:10px;}
  .timeline{display:flex; align-items:flex-end; gap:6px; position:relative; padding-top:10px; flex-wrap:wrap;}
  .t-node{flex:1; min-width:60px; text-align:center;}
  .t-dot{width:24px; height:24px; border-radius:50%; margin:0 auto 8px; border:3px solid #fff; box-shadow:0 0 0 1px var(--line);}
  .t-node .r{font-size:10.5px; color:var(--clay); font-weight:700;}
  .t-node .c{font-family:'Noto Serif KR',serif; font-size:13px; color:var(--forest); margin-top:2px;}

  .freq-row{display:flex; align-items:center; gap:14px; margin-bottom:12px;}
  .freq-row:last-child{margin-bottom:0;}
  .freq-label{width:76px; font-size:12.5px; color:var(--forest); font-weight:600; flex-shrink:0;}
  .freq-bar-bg{flex:1; background:var(--ivory-deep); border-radius:8px; height:18px; overflow:hidden;}
  .freq-bar{height:100%; border-radius:8px;}
  .freq-count{width:20px; font-size:12px; color:#8a8378; text-align:right;}

  .cat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
  @media(max-width:560px){ .cat-grid{grid-template-columns:1fr;} }
  .cat-card{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:16px 18px;}
  .cat-card .name{font-size:12px; font-weight:700; color:var(--clay); margin-bottom:6px;}
  .cat-card .flow{font-family:'Noto Serif KR',serif; font-size:14px; color:var(--forest); display:flex; align-items:center; gap:6px;}
  .cat-card .flow .arrow{color:var(--gold); font-size:13px;}

  .highlight-list{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-md); padding:22px 24px; margin-bottom:16px;}
  .highlight-list div{display:flex; gap:10px; margin-bottom:10px; font-size:13.5px; color:#3f3b34;}
  .highlight-list div:last-child{margin-bottom:0;}
  .highlight-list .check{color:var(--sage); font-weight:900;}

  .split{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:560px){ .split{grid-template-columns:1fr;} }
  .split-card{border-radius:var(--radius-md); padding:22px 24px; font-size:13.5px; color:#4b463f;}
  .split-card.strength{background:#EFF4EC; border:1px solid #D7E3CF;}
  .split-card.direction{background:#F7EFE4; border:1px solid #EAD9BE;}
  .split-card h4{font-family:'Noto Serif KR',serif; font-size:14px; color:var(--forest); margin-bottom:8px;}

  /* ---------- 인쇄 (개인 책자용) ---------- */
  @media print{
    header, .privacy-note, .logout-link, .print-btn{ display:none !important; }
    body{ background:#fff; }
    .wrap{ max-width:100%; padding:0; }
    .carte-cover{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; page-break-after:always; border-radius:0; }
    .month-card{ page-break-after:always; box-shadow:none; min-height:95vh; display:flex; flex-direction:column; justify-content:center; }
    .month-card:last-child{ page-break-after:auto; }
    .summary-section{ page-break-before:always; }
    footer{ display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="brand logotype">Forêt des Crayons</a>
    <a href="index.html" class="cta-btn">홈으로</a>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">Growth Journal</div>
    <h1>우리 아이 성장카르테</h1>
    <p>그림을 통해 본 우리 아이 마음의 성장 이야기를 확인해보세요.</p>
  </div>

  <div id="loginView">
    <div class="login-card">
      <div class="field">
        <label>자녀 이름</label>
        <input type="text" id="jName" placeholder="예: 김민준">
      </div>
      <div class="field">
        <label>보호자 전화번호 뒷 4자리</label>
        <input type="password" id="jPhone4" maxlength="4" placeholder="예: 1234" inputmode="numeric" onkeydown="if(event.key==='Enter') checkJournal()">
      </div>
      <button class="login-btn" onclick="checkJournal()">성장카르테 확인하기</button>
      <div class="login-err" id="jErr"></div>
      <div class="privacy-note">등록하신 이름과 전화번호 뒷자리로 우리 아이의 기록만 확인할 수 있어요.<br>다른 친구들의 기록은 보이지 않습니다.</div>
    </div>
  </div>

  <div id="journalView">
    <div class="carte-cover">
      <div class="brand-mark">Forêt des Crayons</div>
      <h2 id="jCarteTitle">성장카르테</h2>
      <p class="sub">그림을 통해 본 어린이 마음의 성장 이야기</p>
      <div class="cover-photo-ring" id="coverPhotoRing"><div style="width:100%;height:100%;"></div></div>
      <div class="child-name" id="jChildName"></div>
      <div class="term" id="jTerm"></div>
      <div class="stat-row" id="jStatRow"></div>
      <div><button class="print-btn" onclick="window.print()">🖨️ 개인 책자로 인쇄 / PDF 저장</button></div>
    </div>
    <div id="jEntries"></div>
    <div id="jSummary"></div>
    <a href="#" class="logout-link" onclick="logoutJournal(event)">다른 아이 이름으로 다시 확인하기</a>
  </div>
</div>

<footer>© 2026 Forêt des Crayons</footer>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyahvBkqM7NVzHde2vdtpWTGdOhaUs8i-ewGe9WBpuyyetVIv1VEPJrhhCNy3fgrmad/exec";
const MAIN_COLOR_HEX = {
  "빨강":"#D96B5C","주황":"#E0A24C","노랑":"#E8CE68","초록":"#8FA888","청록":"#5C9A93",
  "파랑":"#5C7FA6","남색":"#41577A","보라":"#8B6BA6","분홍":"#D98FA6","갈색":"#8A6B4E",
  "회색":"#A6A29A","검정":"#3A362F","흰색":"#F3EBDC","보랏빛 파랑":"#6E6BA6",
  "민트":"#7FBFA6","핑크":"#D98FA6","자주":"#8B4B5C","무지개":"#C9A6D9"
};
const HUE_ANGLE = {
  "빨강":0,"다홍":18,"주황":42,"노랑":80,"연두":110,"초록":140,"청록":175,"민트":190,
  "파랑":210,"남색":235,"보랏빛 파랑":250,"보라":270,"자주":290,"분홍":330,"핑크":330,"갈색":25
};
function getHueAngle(name){
  if(!name) return null;
  if(name in HUE_ANGLE) return HUE_ANGLE[name];
  for(const k in HUE_ANGLE){ if(name.includes(k)) return HUE_ANGLE[k]; }
  return null; // 회색/검정/흰색 등 무채색 → 중심 근처
}
const MATERIAL_ZONE = {
  angles: { "사고활동":300, "감정활동":60, "뉴트럴":180 },
  bounds: { "사고활동":[240,360], "감정활동":[0,120], "뉴트럴":[120,240] },
  colors: { "사고활동":"#93AC8C", "감정활동":"#BE6A42", "뉴트럴":"#D3A24C" }
};
function normalizeZone(v){
  if(!v) return null;
  if(v.includes('사고')) return '사고활동';
  if(v.includes('감정')) return '감정활동';
  if(v.includes('뉴트럴') || v.includes('중립')) return '뉴트럴';
  return null;
}
function polar(cx,cy,r,angDeg){
  const a = angDeg*Math.PI/180;
  return { x: cx + r*Math.sin(a), y: cy - r*Math.cos(a) };
}
function wedgePath(cx,cy,r,startAngle,endAngle){
  const p1 = polar(cx,cy,r,startAngle), p2 = polar(cx,cy,r,endAngle);
  return `M${cx},${cy} L${p1.x.toFixed(1)},${p1.y.toFixed(1)} A${r},${r} 0 0 1 ${p2.x.toFixed(1)},${p2.y.toFixed(1)} Z`;
}
function renderMaterialWheel(entries){
  const zoned = entries.map(e => ({ ...e, zone: normalizeZone(e.materialEffect) })).filter(e => e.zone);
  if(zoned.length < 2) return '';
  const cx=140, cy=140, minR=26, maxR=112;

  const wedges = Object.entries(MATERIAL_ZONE.bounds).map(([name,[s,e]]) =>
    `<path d="${wedgePath(cx,cy,maxR,s,e)}" fill="${MATERIAL_ZONE.colors[name]}" opacity="0.12"/>`
  ).join('');

  const labels = Object.entries(MATERIAL_ZONE.angles).map(([name,ang]) => {
    const pt = polar(cx,cy,maxR+22,ang);
    return `<text x="${pt.x}" y="${pt.y}" font-size="10.5" fill="${MATERIAL_ZONE.colors[name]}" font-weight="700" text-anchor="middle" dominant-baseline="middle">${name}</text>`;
  }).join('');

  let dots='', path='';
  zoned.forEach((e,i)=>{
    const [s,end] = MATERIAL_ZONE.bounds[e.zone];
    const jitter = ((i % 3) - 1) * ((end-s)/5);
    const ang = MATERIAL_ZONE.angles[e.zone] + jitter;
    const r = minR + (zoned.length<=1?0.5:i/(zoned.length-1))*(maxR-minR);
    const pt = polar(cx,cy,r,ang);
    dots += `<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="7" fill="${MATERIAL_ZONE.colors[e.zone]}" stroke="#fff" stroke-width="2"/>`;
    path += (i===0?'M':'L') + pt.x.toFixed(1) + ',' + pt.y.toFixed(1) + ' ';
  });

  return `
    <div class="wheel-card">
      <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <defs><marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--clay)"/></marker></defs>
        ${wedges}
        <circle cx="${cx}" cy="${cy}" r="${maxR}" fill="none" stroke="#E4DBC9" stroke-width="1"/>
        ${labels}
        <path d="${path}" fill="none" stroke="var(--clay)" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow2)"/>
        ${dots}
      </svg>
      <div class="wheel-caption">중심에서 바깥쪽으로 갈수록 최근 회차예요 · 어느 영역(사고·감정·뉴트럴)에서 주로 활동했는지 흐름을 보여줘요</div>
    </div>`;
}

function renderColorWheel(entries){
  const colored = entries.filter(e => e.mainColor);
  if(colored.length < 2) return '';
  const size=280, cx=140, cy=140, minR=26, maxR=112;
  const hueLabels = [["빨강",0],["주황",42],["노랑",80],["초록",140],["청록",175],["파랑",210],["보라",270],["분홍",330]];
  let rings = [0.33,0.66,1].map(f=>`<circle cx="${cx}" cy="${cy}" r="${minR+(maxR-minR)*f}" fill="none" stroke="#E4DBC9" stroke-width="1"/>`).join('');
  let labels = hueLabels.map(([name,ang])=>{
    const a=ang*Math.PI/180, x=cx+(maxR+18)*Math.sin(a), y=cy-(maxR+18)*Math.cos(a);
    return `<text x="${x}" y="${y}" font-size="10" fill="#9a9285" text-anchor="middle" dominant-baseline="middle">${name}</text>`;
  }).join('');
  let dots='', path='';
  colored.forEach((e,i)=>{
    const ang = getHueAngle(e.mainColor);
    const r = ang===null ? minR*0.5 : minR + (colored.length<=1?0.5:i/(colored.length-1))*(maxR-minR);
    const a = (ang===null?0:ang)*Math.PI/180;
    const x = cx + r*Math.sin(a), y = cy - r*Math.cos(a);
    dots += `<circle cx="${x}" cy="${y}" r="7" fill="${MAIN_COLOR_HEX[e.mainColor]||'#999'}" stroke="#fff" stroke-width="2"/>`;
    path += (i===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  });
  return `
    <div class="wheel-card">
      <svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
        <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--clay)"/></marker></defs>
        ${rings}
        <text x="${cx}" y="${cy}" font-size="10" fill="#9a9285" text-anchor="middle" dominant-baseline="middle">무채색</text>
        ${labels}
        <path d="${path}" fill="none" stroke="var(--clay)" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
        ${dots}
      </svg>
      <div class="wheel-caption">중심(무채색)에서 바깥쪽으로 갈수록 최근 회차예요 · 점을 이은 화살표가 색채 변화의 흐름을 보여줘요</div>
    </div>`;
}

function checkJournal(){
  const name = document.getElementById('jName').value.trim();
  const phone4 = document.getElementById('jPhone4').value.trim();
  const errEl = document.getElementById('jErr');
  errEl.textContent = '';

  if(!name || phone4.length !== 4){
    errEl.textContent = '이름과 전화번호 뒷자리 4자리를 정확히 입력해주세요.';
    return;
  }

  const btn = document.querySelector('.login-btn');
  btn.disabled = true; btn.textContent = '확인 중...';

  const params = new URLSearchParams({ action:'journal', name, phone4 });
  fetch(GAS_URL + '?' + params.toString())
    .then(r => r.json())
    .then(data => {
      btn.disabled = false; btn.textContent = '성장카르테 확인하기';
      if(!data.found){
        errEl.textContent = data.message || '일치하는 기록이 없어요.';
        return;
      }
      renderJournal(data);
    })
    .catch(() => {
      btn.disabled = false; btn.textContent = '성장카르테 확인하기';
      errEl.textContent = '불러오는 중 문제가 발생했어요. 잠시 후 다시 시도해주세요.';
    });
}

function renderJournal(data){
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('journalView').style.display = 'block';
  document.getElementById('jChildName').textContent = `${data.name} 어린이`;
  document.getElementById('jTerm').textContent = data.term || '';

  const entries = data.entries || [];

  // 표지 대표 사진: 첫 기록의 사진1 사용
  const coverImg = entries.find(e => e.photo1)?.photo1;
  document.getElementById('coverPhotoRing').innerHTML = coverImg
    ? `<img src="${coverImg}" alt="대표 사진" onerror="this.parentElement.style.background='var(--ivory-deep)'">`
    : '';

  document.getElementById('jStatRow').innerHTML = `
    <div><b>${entries.length}</b>총 기록 개월수</div>
    <div><b>${new Set(entries.map(e=>e.mainColor).filter(Boolean)).size}</b>사용한 컬러 수</div>
  `;

  const wrap = document.getElementById('jEntries');
  if(entries.length === 0){
    wrap.innerHTML = '<div class="empty-state">아직 등록된 월별 기록이 없어요. 다음 달부터 차곡차곡 쌓일 예정이에요 🌿</div>';
    return;
  }

  wrap.innerHTML = entries.map((e, i) => `
    <div class="month-card">
      <div class="month-num">${String(i+1).padStart(2,'0')}</div>
      <div class="month-title-row">
        <span class="month-badge">${e.month}</span>
        ${e.title ? `<div class="artwork-title">「${e.title}」</div>` : ''}
      </div>
      <div class="carte-grid">
        <div>
          <img class="photo-main" src="${e.photo1 || ''}" alt="${e.month} 작품 사진" onerror="this.style.display='none'">
          <div class="observation">
            <span class="observation-label">꽃밭샘 관찰</span>
            ${e.note || '이 달의 관찰 기록이 아직 입력되지 않았어요.'}
          </div>
        </div>
        <div>
          ${e.photo2 ? `<img class="photo-sub" src="${e.photo2}" alt="${e.month} 활동 사진" onerror="this.style.display='none'">` : ''}
          <div class="info-block">
            <span class="info-label">이 달의 메인컬러</span>
            <div class="color-row">
              <span class="swatch" style="background:${MAIN_COLOR_HEX[e.mainColor] || '#ccc'}"></span>
              <span>${e.mainColor || '-'}</span>
            </div>
          </div>
          ${e.materials ? `
          <div class="info-block">
            <span class="info-label">사용 재료</span>
            <div class="material-pills">${e.materials.split(/[,、]/).map(m=>`<span class="pill">${m.trim()}</span>`).join('')}</div>
          </div>` : ''}
          ${(e.emotionKeywords && e.emotionKeywords.length) ? `
          <div class="info-block">
            <span class="info-label">감정 키워드</span>
            <div class="material-pills">${e.emotionKeywords.map(k=>`<span class="pill">${k}</span>`).join('')}</div>
          </div>` : ''}
          ${e.engagement ? `
          <div class="info-block">
            <span class="info-label">몰입도</span>
            <div class="material-pills"><span class="pill">${e.engagement}</span></div>
          </div>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  renderSummarySection(entries, data.summary);
}

function renderSummarySection(entries, summary){
  const box = document.getElementById('jSummary');
  const colored = entries.filter(e => e.mainColor);

  // 자동 생성: 색채 타임라인
  let timelineHtml = '';
  if(colored.length){
    timelineHtml = `
      <div class="timeline-card">
        <div class="timeline">
          ${colored.map(e => `
            <div class="t-node">
              <div class="r">${e.month}</div>
              <div class="t-dot" style="background:${MAIN_COLOR_HEX[e.mainColor] || '#ccc'}"></div>
              <div class="c">${e.mainColor}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // 자동 생성: 색 사용 빈도
  let freqHtml = '';
  if(colored.length){
    const counts = {};
    colored.forEach(e => counts[e.mainColor] = (counts[e.mainColor]||0) + 1);
    const max = Math.max(...Object.values(counts));
    const rows = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([color,count])=>`
      <div class="freq-row">
        <div class="freq-label">${color}</div>
        <div class="freq-bar-bg"><div class="freq-bar" style="width:${(count/max*100)}%; background:${MAIN_COLOR_HEX[color] || '#ccc'};"></div></div>
        <div class="freq-count">${count}</div>
      </div>`).join('');
    freqHtml = `<div class="freq-card">${rows}</div>`;
  }

  let autoSection = '';
  if(timelineHtml || freqHtml){
    const wheelHtml = renderColorWheel(entries);
    const materialWheelHtml = renderMaterialWheel(entries);
    autoSection = `
      <div class="summary-section">
        <div class="sec-label"><span class="tag tag-auto">자동 생성</span><h3>회차별 색채 변화</h3></div>
        ${wheelHtml}
        ${timelineHtml}
        ${freqHtml}
        ${materialWheelHtml ? `<div class="sec-label" style="margin-top:24px;"><span class="tag tag-auto">자동 생성</span><h3>재료 효과 바퀴 (사고·감정·뉴트럴)</h3></div>${materialWheelHtml}` : ''}
      </div>`;
  }

  // 원장님 작성: 카테고리 요약 + 강점/방향
  let manualSection = '';
  if(summary){
    const cat = (icon, name, before, after) => (before || after) ? `
      <div class="cat-card"><div class="name">${icon} ${name}</div><div class="flow">${before||'-'} <span class="arrow">→</span> ${after||'-'}</div></div>` : '';

    const cats = [
      cat('🔵','표현', summary.expression?.before, summary.expression?.after),
      cat('🟢','색채', summary.color?.before, summary.color?.after),
      cat('🟡','심리', summary.psychology?.before, summary.psychology?.after),
      cat('🔴','사고', summary.thinking?.before, summary.thinking?.after),
    ].filter(Boolean).join('');

    const highlights = (summary.highlights||[]).map(h => `<div><span class="check">✔</span>${h}</div>`).join('');

    manualSection = `
      <div class="summary-section">
        <div class="sec-label"><span class="tag tag-manual">꽃밭샘 종합 관찰</span><h3>성장 카테고리 요약</h3></div>
        ${cats ? `<div class="cat-grid">${cats}</div>` : ''}
        ${highlights ? `<div class="highlight-list">${highlights}</div>` : ''}
        ${(summary.strength || summary.direction) ? `
        <div class="split">
          ${summary.strength ? `<div class="split-card strength"><h4>강점</h4><p>${summary.strength}</p></div>` : ''}
          ${summary.direction ? `<div class="split-card direction"><h4>앞으로의 방향</h4><p>${summary.direction}</p></div>` : ''}
        </div>` : ''}
      </div>`;
  }

  box.innerHTML = autoSection + manualSection;
}

function logoutJournal(e){
  e.preventDefault();
  document.getElementById('journalView').style.display = 'none';
  document.getElementById('loginView').style.display = 'block';
  document.getElementById('jName').value = '';
  document.getElementById('jPhone4').value = '';
  document.getElementById('jErr').textContent = '';
}
</script>
</body>
</html>
