backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "content"
    label: "홈페이지 콘텐츠"
    files:
      - file: "content/settings.json"
        label: "연락처 · 위치 정보"
        name: "settings"
        fields:
          - { label: "전화번호", name: "phone", widget: "string" }
          - { label: "주소", name: "address", widget: "string" }
          - { label: "카카오톡 채널 링크", name: "kakao", widget: "string", required: false }
          - { label: "인스타그램(크레용숲) 링크", name: "instagram1", widget: "string", required: false }
          - { label: "인스타그램(어린이색채학교) 링크", name: "instagram2", widget: "string", required: false }
          - { label: "블로그 링크", name: "blog", widget: "string", required: false }

      - file: "content/popup.json"
        label: "팝업 공지"
        name: "popup"
        fields:
          - { label: "팝업 사용 여부 (끄면 안 뜸)", name: "enabled", widget: "boolean", default: true }
          - { label: "상단 배너 문구", name: "banner_text", widget: "string" }
          - { label: "제목", name: "title", widget: "string" }
          - { label: "본문", name: "body", widget: "text" }

      - file: "content/banners.json"
        label: "메인 배너 문구"
        name: "banners"
        fields:
          - label: "배너 목록 (좌측부터 순서대로 노출)"
            name: "slides"
            widget: "list"
            fields:
              - { label: "태그 (예: Child Art)", name: "tag", widget: "string" }
              - { label: "제목 문구", name: "title", widget: "string" }

      - file: "content/events.json"
        label: "SCHEDULE · 특강/일정"
        name: "events"
        fields:
          - label: "일정 목록"
            name: "items"
            widget: "list"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "날짜", name: "date", widget: "date", format: "YYYY-MM-DD" }
              - { label: "설명", name: "desc", widget: "text" }
